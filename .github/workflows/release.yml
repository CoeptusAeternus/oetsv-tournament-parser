name: Release Images

on:
  release:
    types:
      - published

  workflow_dispatch:
    inputs:
      version:
        description: Release version or tag to publish
        required: true
        type: string

env:
  IMAGE_NAME: oetsv-parser
  DOCKERHUB_NAMESPACE: coeptus

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew test --no-daemon

  publish_images:
    needs: test
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve release version
        shell: bash
        run: |
          version="${{ inputs.version }}"

          if [ -z "$version" ]; then
            version="${{ github.event.release.tag_name }}"
          fi

          printf 'VERSION=%s\n' "$version" >> "$GITHUB_ENV"
          printf 'GHCR_OWNER=%s\n' "$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: coeptus
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Store release version artifact
        run: |
          printf '%s\n' "${VERSION}" > release-version.txt

      - name: Upload release version artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-version
          path: release-version.txt

      - name: Build and push multi-arch images
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true

          tags: |
            ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }}
            ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.IMAGE_NAME }}:latest
            ghcr.io/${{ env.GHCR_OWNER }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }}
            ghcr.io/${{ env.GHCR_OWNER }}/${{ env.IMAGE_NAME }}:latest

          labels: |
            org.opencontainers.image.version=${{ env.VERSION }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
